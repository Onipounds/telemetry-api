name: Deploy

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      AWS_REGION: eu-west-2
      ECR_REPO: 126000553940.dkr.ecr.eu-west-2.amazonaws.com/telemetry-api
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Log in to Amazon ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
            | docker login --username AWS --password-stdin 126000553940.dkr.ecr.eu-west-2.amazonaws.com

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names telemetry-api --region $AWS_REGION \
            || aws ecr create-repository --repository-name telemetry-api --region $AWS_REGION

      - name: Build image
        run: docker build -t $ECR_REPO:latest .

      - name: Push image to ECR
        run: docker push $ECR_REPO:latest

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init and validate
        working-directory: terraform
        run: |
          terraform init
          terraform validate